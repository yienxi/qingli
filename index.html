<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="轻历 — 轻量中国日历，一眼看清农历、节气、节假日、宜忌">
  <meta name="theme-color" content="#F7F3EE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="轻历">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="/public/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/public/logo.svg">
  <link rel="apple-touch-icon" href="/public/logo.svg">
  <title>轻历</title>
  <link rel="stylesheet" href="/css/design-system.css?v=2.2">
  <link rel="stylesheet" href="/css/calendar.css?v=2.2">
  <link rel="stylesheet" href="/css/responsive.css?v=2.2">
</head>
<body>
  <div class="app" id="app">

    <header class="app-header">
      <div class="app-brand">
        <img src="/public/logo.svg" alt="轻历" class="app-logo" width="32" height="32">
        <span class="brand-text">轻历</span>
      </div>
      <div class="app-actions">
        <button class="icon-btn" id="themeToggle" aria-label="切换主题" title="切换主题">
          <span id="themeIcon">☀</span>
        </button>
        <button class="icon-btn" id="searchBtn" aria-label="搜索事件" title="搜索事件">
          <span>🔍</span>
        </button>
      </div>
    </header>

    <div class="pwa-install-banner" id="pwaInstallBanner" style="display:none">
      <div class="pwa-install-content">
        <div class="pwa-install-icon">📅</div>
        <div class="pwa-install-text">
          <strong>将轻历添加到桌面</strong>
          <span>无需打开浏览器，就像用 App 一样使用</span>
        </div>
      </div>
      <div class="pwa-install-actions">
        <button class="pwa-install-btn" id="pwaInstallBtn">安装</button>
        <button class="pwa-install-dismiss" id="pwaDismissBtn">✕</button>
      </div>
    </div>

    <div class="search-panel" id="searchPanel" style="display: none;">
      <input type="text" id="searchInput" placeholder="搜索事件..." class="search-input">
      <div id="searchResults" class="search-results"></div>
    </div>

    <div class="today-card" id="todayCard">
      <div class="today-head">
        <div class="today-date-row">
          <span class="today-day" id="todayCardDay"></span>
          <div class="today-date-meta">
            <span class="today-month-year" id="todayCardMonthYear"></span>
            <span class="today-weekday" id="todayCardWeekday"></span>
          </div>
        </div>
        <div class="today-lunar" id="todayCardLunar"></div>
        <div class="today-ganzhi" id="todayCardGanzhi"></div>
      </div>
      <div class="today-divider"></div>
      <div class="today-almanac">
        <div class="today-yi-section">
          <span class="today-almanac-label label-yi">宜</span>
          <div class="today-yiji-list" id="todayCardYiList"></div>
        </div>
        <div class="today-ji-section">
          <span class="today-almanac-label label-ji">忌</span>
          <div class="today-yiji-list" id="todayCardJiList"></div>
        </div>
      </div>
      <div class="today-almanac-details">
        <div class="almanac-detail-row">
          <span class="detail-label">值神</span>
          <span class="detail-value" id="todayCardZhiShen"></span>
        </div>
        <div class="almanac-detail-row">
          <span class="detail-label">星宿</span>
          <span class="detail-value" id="todayCardXingXiu"></span>
        </div>
        <div class="almanac-detail-row">
          <span class="detail-label">纳音</span>
          <span class="detail-value" id="todayCardNaYin"></span>
        </div>
        <div class="almanac-detail-row">
          <span class="detail-label">喜神</span>
          <span class="detail-value" id="todayCardXiShen"></span>
        </div>
        <div class="almanac-detail-row">
          <span class="detail-label">财神</span>
          <span class="detail-value" id="todayCardCaiShen"></span>
        </div>
        <div class="almanac-detail-row">
          <span class="detail-label">冲煞</span>
          <span class="detail-value" id="todayCardChongSha"></span>
        </div>
      </div>
      <div class="today-ai-summary" id="todayAiSummary"></div>
    </div>

    <nav class="cal-nav" id="calNav">
      <div class="cal-nav-title">
        <span class="year" id="navYear"></span>
        <span class="month" id="navMonth"></span>
      </div>
      <div class="cal-nav-controls">
        <button class="icon-btn" id="prevMonth" aria-label="上个月">
          ‹
          <span class="tooltip">上个月</span>
        </button>
        <button class="today-btn" id="todayBtn">今天</button>
        <button class="icon-btn" id="nextMonth" aria-label="下个月">
          ›
          <span class="tooltip">下个月</span>
        </button>
      </div>
    </nav>

    <div class="cal-grid" id="calGrid"></div>

    <div class="cal-legend">
      <span class="legend-item legend-holiday">节假日</span>
      <span class="legend-item legend-term">节气</span>
      <span class="legend-item legend-event">个人事件</span>
    </div>

    <section class="ical-section">
      <h2 class="ical-section-title">订阅到你的日历</h2>
      <p class="ical-section-desc">复制链接，粘贴到 Apple 日历 / Google Calendar / Outlook 的「订阅日历」中，节假日和节气自动同步。</p>
      <div class="ical-grid">
        <div class="ical-card ical-card-featured">
          <div class="ical-card-icon">🎉</div>
          <div class="ical-card-title">节日与假期</div>
          <div class="ical-card-desc">法定节假日、传统节日、调休提醒</div>
          <span class="ical-card-url" id="icalUrlFestivals" data-url="festivals">加载中...</span>
          <button class="ical-copy-btn" data-type="festivals">复制链接</button>
        </div>
        <div class="ical-card">
          <div class="ical-card-icon">🌿</div>
          <div class="ical-card-title">二十四节气</div>
          <div class="ical-card-desc">立春、夏至、秋分、冬至...</div>
          <span class="ical-card-url" id="icalUrlTerms" data-url="terms">加载中...</span>
          <button class="ical-copy-btn" data-type="terms">复制链接</button>
        </div>
        <div class="ical-card">
          <div class="ical-card-icon">📋</div>
          <div class="ical-card-title">每日宜忌</div>
          <div class="ical-card-desc">每日黄历宜忌摘要</div>
          <span class="ical-card-url" id="icalUrlYiji" data-url="yiji">加载中...</span>
          <button class="ical-copy-btn" data-type="yiji">复制链接</button>
        </div>
        <div class="ical-card ical-card-full">
          <div class="ical-card-icon">🗓</div>
          <div class="ical-card-title">完整日历</div>
          <div class="ical-card-desc">以上全部合并订阅</div>
          <span class="ical-card-url" id="icalUrlAll" data-url="all">加载中...</span>
          <button class="ical-copy-btn" data-type="all">复制链接</button>
        </div>
      </div>
    </section>

    <footer class="app-footer">
      <span class="footer-text">轻历 · 开源 · MIT</span>
      <span class="footer-version" id="footerVersion"></span>
      <a href="https://github.com/yienxi/qingli" class="footer-link" target="_blank">GitHub</a>
    </footer>

  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="/js/calendar.js?v=2.2"></script>
  <script type="module" src="/js/events.js?v=2.2"></script>
  <script type="module" src="/js/app.js?v=2.2"></script>
</body>
</html>

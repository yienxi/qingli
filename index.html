<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="轻历 — 轻量中国日历，一眼看清农历、节气、节假日、宜忌">
  <meta name="theme-color" content="#F7F3EE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="/public/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/public/logo.svg">
  <link rel="apple-touch-icon" href="/public/logo.svg">
  <title>轻历 — 中国日历</title>
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/calendar.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div class="app" id="app">
    <header class="app-header">
      <div class="app-brand">
        <img src="/public/logo.svg" alt="轻历" class="app-logo" width="32" height="32">
        <span class="brand-text">轻历</span>
      </div>
      <div class="app-actions">
        <button class="icon-btn" id="themeToggle" aria-label="切换主题" title="切换主题">
          <span id="themeIcon">☀</span>
        </button>
        <button class="icon-btn" id="searchBtn" aria-label="搜索事件" title="搜索事件">
          <span>🔍</span>
        </button>
      </div>
    </header>

    <div class="search-panel" id="searchPanel" style="display: none;">
      <input type="text" id="searchInput" placeholder="搜索事件..." class="search-input">
      <div id="searchResults" class="search-results"></div>
    </div>

    <div class="today-card" id="todayCard">
      <div class="today-card-left">
        <div class="today-card-date" id="todayCardDate"></div>
        <div class="today-card-lunar" id="todayCardLunar"></div>
        <div class="today-card-ganzhi" id="todayCardGanzhi"></div>
      </div>
      <div class="today-card-right">
        <div class="today-card-yi" id="todayCardYi"></div>
        <div class="today-card-ji" id="todayCardJi"></div>
      </div>
    </div>

    <nav class="cal-nav" id="calNav">
      <div class="cal-nav-title">
        <span class="year" id="navYear"></span>
        <span class="month" id="navMonth"></span>
      </div>
      <div class="cal-nav-controls">
        <button class="icon-btn" id="prevMonth" aria-label="上个月">
          ‹
          <span class="tooltip">上个月</span>
        </button>
        <button class="today-btn" id="todayBtn">今天</button>
        <button class="icon-btn" id="nextMonth" aria-label="下个月">
          ›
          <span class="tooltip">下个月</span>
        </button>
      </div>
    </nav>

    <div class="weekday-header" id="weekdayHeader">
      <div class="weekday-cell">一</div>
      <div class="weekday-cell">二</div>
      <div class="weekday-cell">三</div>
      <div class="weekday-cell">四</div>
      <div class="weekday-cell">五</div>
      <div class="weekday-cell weekend">六</div>
      <div class="weekday-cell weekend">日</div>
    </div>

    <div class="cal-grid" id="calGrid"></div>

    <div class="legend-bar">
      <span class="legend-item">
        <span class="legend-dot" style="background:var(--color-accent-red)"></span> 节假日
      </span>
      <span class="legend-item">
        <span class="legend-dot" style="background:var(--color-accent-brown)"></span> 节气
      </span>
      <span class="legend-item">
        <span class="legend-dot" style="background:var(--color-accent-green)"></span> 个人事件
      </span>
      <span class="legend-item" id="dataVersion" style="display:none">
        <span class="legend-dot" style="background:var(--color-accent-gold)"></span> 数据: <span id="versionNumber">-</span>
      </span>
    </div>

    <section class="ical-section" id="icalSection">
      <h2 class="ical-section-title">订阅到你的日历</h2>
      <p class="ical-section-desc">
        复制下面的链接，添加到 Apple 日历 / Google Calendar / Outlook，节假日和节气自动同步。
      </p>
      <div class="ical-links">
        <div class="ical-link-row">
          <span class="ical-label">全部合并</span>
          <span class="ical-url" data-url="all" id="icalUrlAll">加载中...</span>
          <button class="copy-btn" data-type="all">复制</button>
        </div>
        <div class="ical-link-row">
          <span class="ical-label">法定节假日</span>
          <span class="ical-url" data-url="holidays" id="icalUrlHolidays">加载中...</span>
          <button class="copy-btn" data-type="holidays">复制</button>
        </div>
        <div class="ical-link-row">
          <span class="ical-label">农历节日</span>
          <span class="ical-url" data-url="lunar" id="icalUrlLunar">加载中...</span>
          <button class="copy-btn" data-type="lunar">复制</button>
        </div>
        <div class="ical-link-row">
          <span class="ical-label">二十四节气</span>
          <span class="ical-url" data-url="terms" id="icalUrlTerms">加载中...</span>
          <button class="copy-btn" data-type="terms">复制</button>
        </div>
      </div>
    </section>

    <footer class="app-footer">
      <span>轻历 · 开源 · MIT</span>
      <span>
        <a href="https://github.com/yienxi/qingli" target="_blank" rel="noopener">GitHub</a>
      </span>
    </footer>
  </div>

  <div class="detail-overlay" id="detailOverlay"></div>
  <div class="detail-panel" id="detailPanel">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <div class="panel-date" id="panelDate"></div>
      <div class="panel-lunar" id="panelLunar"></div>
    </div>
    <div id="panelTags" class="panel-tags"></div>

    <div class="panel-almanac" id="panelAlmanac">
      <div class="almanac-section">
        <div class="almanac-label almanac-yi">宜</div>
        <div class="almanac-content" id="panelYi"></div>
      </div>
      <div class="almanac-section">
        <div class="almanac-label almanac-ji">忌</div>
        <div class="almanac-content" id="panelJi"></div>
      </div>
    </div>

    <div class="panel-info-grid" id="panelInfoGrid">
      <div class="info-item">
        <span class="info-label">冲煞</span>
        <span class="info-value" id="panelChongsha"></span>
      </div>
      <div class="info-item">
        <span class="info-label">值神</span>
        <span class="info-value" id="panelZhishen"></span>
      </div>
      <div class="info-item">
        <span class="info-label">纳音</span>
        <span class="info-value" id="panelNayin"></span>
      </div>
      <div class="info-item">
        <span class="info-label">星宿</span>
        <span class="info-value" id="panelXingxiu"></span>
      </div>
      <div class="info-item">
        <span class="info-label">喜神</span>
        <span class="info-value" id="panelXishen"></span>
      </div>
      <div class="info-item">
        <span class="info-label">财神</span>
        <span class="info-value" id="panelCaishen"></span>
      </div>
    </div>

    <div class="panel-section-title">日程事件</div>
    <div id="panelEvents" class="event-list"></div>

    <form class="event-form" id="eventForm">
      <input type="text" id="eventTitleInput" placeholder="事件标题" required>
      <div style="display:flex; gap: var(--space-2);">
        <input type="time" id="eventTimeInput" style="flex:1;">
        <input type="color" id="eventColorInput" value="#5B8F7A" style="width:40px; height:36px; padding:2px; border-radius: var(--radius-md);">
      </div>
      <div class="event-form-actions">
        <button type="button" class="today-btn" id="panelCloseBtn" style="border-color: var(--color-border); color: var(--color-text-secondary);">关闭</button>
        <button type="submit" class="today-btn" id="eventSubmitBtn">添加事件</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="/js/calendar.js"></script>
  <script type="module" src="/js/events.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
